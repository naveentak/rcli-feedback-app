steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/rcli/feedback:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/rcli/feedback:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/rcli/feedback

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - feedback-service
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/rcli/feedback:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-secrets=GITHUB_TOKEN=github-token:latest,API_KEYS=api-keys:latest,FEEDBACK_HMAC_SECRET=feedback-hmac-secret:latest
      - --set-env-vars=GITHUB_OWNER=naveentak,GITHUB_REPO=rcli-feedback-app,DEV_MODE=false,PUBLIC_SUBMIT=true,GIN_MODE=release

substitutions:
  _REGION: europe-west1

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/rcli/feedback:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/rcli/feedback:latest